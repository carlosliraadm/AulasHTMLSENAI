<!DOCTYPE html>
<html lang="Pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criando Tabelas</title>
    <style>
        h1{
            width: 60%;
            margin: 50px auto;
            border-collapse: collapse;
            background-color: black;
        }
        th, td {
            border: 1px solid #333;
            padding: 12px;
            text-align: center; 
    }

    </style>
</head>
<body>
    <table>
        <tr>
            <th colspan="4">Guia de cursos para aprendizando</th>
        </tr>
        <tr>
            <td>Linguagens</td>
            <td>Java</td>
            <td>Python</td>
            <td>C++</td>
        </tr>
        <tr>
            <td>Dificuldade</td>
            <td>Baixa</td>
            <td>Média</td>
            <td>Média</td>
        </tr>
        <tr>
            <td>Valor de Mercado</td>
            <td>Alta</td>
            <td>Média</td>
            <td>Média</td>
        </tr>
    </table>
</body>
</html>
