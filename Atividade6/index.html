<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crácha virtual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body class="container p-5">
    <main>
        <form>
            <h1>Crachá Virtual</h1>
            <div class="mb-3">
                <label class="form-label" for="Nome"> Digite seu nome: </label>
                <input class="form-control p-3" type="text" id="Nome">
            </div>
            <div class="mb-3">
                <label class="form-label" for="Idade"> Digite sua idade: </label>
                <input class="form-control p-3" type="number" id="Idade">
            </div>
            <div class="mb-3">
                <label class="form-label" for="Cargo"> Digite seu cargo: </label>
                <input class="form-control p-3" type="text" id="Cargo">
            </div>
            <div class="mb-3">
                <label class="form-label" for="Departamento"> Digite seu Departamento: </label>
                <input class="form-control p-3" type="text" id="Departamento">
            </div>
            <div class="mb-3 form-check">
                <label class="form-check-label" for="Acesso_Restrito"> Tem acesso restrito? </label>
                <input class="form-check-input" type="checkbox" id="Acesso_Restrito">
            </div>
            <button class="btn btn-primary" onclick="imprimirnome()">Enviar dados</button>
            <script src="cracha.js"></script>
        </form>
    </main>
</body>

</html>
